<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamenIT - Подготовка к ОГЭ по информатике</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- Кнопка "Наверх" -->
    <button id="scrollToTop" class="scroll-to-top">↑</button>

    <!-- Переключатель темной темы -->
    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header">
        <div class="container">
            <div class="logo">
                Examen<strong>IT</strong>
            </div>
            <p class="subtitle">Сайт с материалами по подготовке к ОГЭ по информатике</p>
            
            <!-- Счетчик посещений -->
            <div class="stats-panel">
                <div class="stat-item">
                    <span class="stat-icon">👥</span>
                    <span>Посетителей: <strong id="visitCounter">0</strong></span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📚</span>
                    <span>Материалов: <strong>14</strong></span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⏱️</span>
                    <span>Время: <strong id="timeCounter">0:00</strong></span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Прогресс изучения -->
        <div class="progress-tracker">
            <h3>Ваш прогресс изучения</h3>
            <div class="progress-bar-container">
                <div class="progress-bar" id="studyProgress">
                    <span class="progress-text">0%</span>
                </div>
            </div>
            <p class="progress-info">Просмотрено <span id="watchedCount">0</span> из 14 материалов</p>
            <button class="reset-progress" onclick="resetProgress()">Сбросить прогресс</button>
        </div>

        <div class="main-content">
            
            <div class="section">
                <button type="button" class="collapsible">
                    <span class="collapsible-icon">📚</span>
                    <strong>Разбор заданий</strong>
                    <span class="badge">10 заданий</span>
                </button>
                <div class="contentMain">
                    <div class="tasks-grid">
                        <button type="button" class="collapsible box" data-task="1">
                            <span class="task-number">1</span>
                            Задание 1
                            <span class="watched-indicator">✓</span>
                        </button>
                        <div class="contentBox">
                            <div class="video-wrapper">

                            </div>
